[mcp_servers.zenmoney]
command = "/home/adre/.local/bin/uv"
args = ["run", "--directory", "/home/adre/personal-office/tools/zenmoney-mcp", "zenmoney-mcp"]

[mcp_servers.zenmoney.env]
ZENMONEY_READ_ONLY = "1"

[mcp_servers.zenmoney.tools.get_accounts]
approval_mode = "approve"

[mcp_servers.zenmoney.tools.get_categories]
approval_mode = "approve"

[mcp_servers.zenmoney.tools.get_budgets]
approval_mode = "approve"

[mcp_servers.zenmoney.tools.get_transactions]
approval_mode = "approve"

[mcp_servers.linkedin]
url = "http://127.0.0.1:8019/mcp"

[mcp_servers.linkedin.tools.send_message]
approval_mode = "approve"

[mcp_servers.headhunter_web]
command = "/home/adre/personal-office/tools/job-search-runtime/run-headhunter-web-mcp.sh"
args = []

[mcp_servers.headhunter_web.env]
UV_CACHE_DIR = "/home/adre/personal-office/.cache/uv"
HH_WEB_STORAGE_STATE = "/home/adre/personal-office/tools/headhunter-web-mcp/.local/state/hh-storage-state.json"

[mcp_servers.headhunter_web.tools.hh_web_healthcheck]
approval_mode = "approve"

[mcp_servers.headhunter_web.tools.hh_web_get_vacancy]
approval_mode = "approve"

[mcp_servers.headhunter_web.tools.hh_web_extract_from_digest_urls]
approval_mode = "approve"

[mcp_servers.headhunter_web.tools.hh_web_get_applications]
approval_mode = "approve"

[mcp_servers.headhunter_web.tools.hh_web_search_vacancies]
approval_mode = "approve"

[mcp_servers.headhunter_web.tools.hh_web_get_suitable_vacancies]
approval_mode = "approve"

[mcp_servers.headhunter_web.tools.hh_web_open_chat_by_chat_id]
approval_mode = "approve"

[mcp_servers.headhunter_web.tools.hh_web_list_resumes]
approval_mode = "approve"
